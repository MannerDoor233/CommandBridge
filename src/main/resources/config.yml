# RelinkPlugins 配置文件
api:
  port: 9178
  keys:
    haavk-admin:
      name: "管理员密钥"
      type: static
      permissions: ["admin.*"]
      ipWhitelist: []
      rateLimit: 100
    haavk-operator:
      name: "操作员密钥"
      type: static
      permissions: ["command.*", "broadcast", "kick", "gamemode"]
      ipWhitelist: []
      rateLimit: 30
    haavk-viewer:
      name: "只读密钥"
      type: static
      permissions: ["status", "players", "tps", "logs", "memory"]
      ipWhitelist: []
      rateLimit: 10
