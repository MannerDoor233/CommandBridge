name: Auto Release on Tag

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Maven
        run: mvn -B package -DskipTests

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            修复版本兼容性问题。

            - 修复 jar 为 Java 8 字节码，现在可在 Java 8 上加载
            - 修复 Spigot 上 /tps 端点因 NoSuchMethodError 挂死的问题
            - 修复 /diagnose 同理
            - 修复 InputStream.readAllBytes() 在 Java 8 上不存在的问题

            测试通过版本: Paper 1.21.8 / Spigot 1.12.2 / Spigot 1.8.8
          files: target/RelinkPlugins-*.jar
          fail_on_unmatched_files: false
          generate_release_notes: false
