name: Auto Release on Tag

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Maven
        run: mvn -B package -DskipTests

      - name: Generate bilingual release notes
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-creatordate | head -n 2 | tail -n 1 2>/dev/null || echo "")
          TAG="${{ github.ref_name }}"

          # Get commits since previous tag
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"%s" "$PREV_TAG..$TAG" 2>/dev/null)
          else
            LOG=$(git log --pretty=format:"%s" 2>/dev/null | tail -n 20)
          fi

          # Build Chinese section
          echo "$TAG 更新内容：" > /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          echo "$LOG" | while IFS= read -r line; do
            if [ -n "$line" ]; then
              echo "- $line" >> /tmp/release_notes.md
            fi
          done

          echo "" >> /tmp/release_notes.md
          echo "---" >> /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md

          # Build English section
          echo "$TAG Release Notes:" >> /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          echo "$LOG" | while IFS= read -r line; do
            if [ -n "$line" ]; then
              echo "- $line" >> /tmp/release_notes.md
            fi
          done

          cat /tmp/release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: /tmp/release_notes.md
          files: target/RelinkPlugins-*.jar
          fail_on_unmatched_files: false
          generate_release_notes: false
